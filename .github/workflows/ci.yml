name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit --skipLibCheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          TURSO_DATABASE_URL: file:./ci.db
          TURSO_AUTH_TOKEN: ""
          AUTH_SECRET: ci-secret-not-real
